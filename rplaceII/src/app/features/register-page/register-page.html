<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Criar Conta</h2>
    </div>
    <div class="card-body">
      <div class="form">
        <input [(ngModel)]="name" placeholder="Nome completo">
        <input [(ngModel)]="email" placeholder="Email">
        <input [(ngModel)]="password" type="password" placeholder="Senha">
        <input [(ngModel)]="confirmPassword" type="password" placeholder="Confirmar senha">
        <button (click)="register()">Cadastrar</button>
        <p>
          Já tem conta?
          <a routerLink="/login">Entrar</a>
        </p>
      </div>
    </div>
  </div>
</div>
